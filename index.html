<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個股期貨動能排行</title>
    <style>
        :root {
            --bg: #f0f2f5; --card: #fff; --primary: #1a56db;
            --bull: #e53935; --bull-bg: #fff0f0;
            --bear: #2e7d32; --bear-bg: #f0fff1;
            --vol: #1565c0;  --vol-bg: #e8f0fe;
            --neutral: #757575; --text: #1a1a2e;
            --muted: #8a8a9a; --border: #e5e7eb;
            --shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
               background: var(--bg); margin: 0; color: var(--text); }
        header { background: var(--primary); color: #fff; padding: 14px 16px 12px;
                 position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(26,86,219,.3); }
        .header-row { display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-meta { font-size: 11px; color: #b3c6ff; margin-top: 4px; }
        #refresh-btn { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
            color: #fff; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 4px; }
        #refresh-btn.spinning svg { animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border);
                position: sticky; top: 57px; z-index: 99; }
        .tab { flex: 1; text-align: center; padding: 11px 0 10px; font-size: 13px;
               font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; cursor: pointer; }
        .tab.bull.active { color: var(--bull); border-color: var(--bull); }
        .tab.bear.active { color: var(--bear); border-color: var(--bear); }
        .tab.vol.active  { color: var(--vol);  border-color: var(--vol); }
        .list-wrap { display: none; padding: 10px 10px 24px; }
        .list-wrap.active { display: block; }
        .card { background: var(--card); border-radius: 10px; padding: 13px 14px;
                margin-bottom: 8px; box-shadow: var(--shadow);
                display: flex; align-items: center; gap: 10px; }
        .rank { width: 26px; height: 26px; border-radius: 50%; display: flex;
                align-items: center; justify-content: center;
                font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .rank.bull { background: var(--bull-bg); color: var(--bull); }
        .rank.bear { background: var(--bear-bg); color: var(--bear); }
        .rank.vol  { background: var(--vol-bg);  color: var(--vol); }
        .card-body { flex: 1; min-width: 0; }
        .stock-name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .sid-tag { font-size: 10px; background: #f0f0f0; color: #666;
                   padding: 1px 5px; border-radius: 4px; flex-shrink: 0; }
        .stock-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
        .card-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .stock-price { font-size: 16px; font-weight: 700; }
        .stock-change { font-size: 13px; font-weight: 600; margin-top: 2px; }
        .stock-change.bull { color: var(--bull); }
        .stock-change.bear { color: var(--bear); }
        .stock-change.flat { color: var(--neutral); }
        .bias-tag {
            font-size: 11px; font-weight: 600; margin-top: 3px;
            display: inline-block; padding: 1px 6px; border-radius: 4px;
        }
        .bias-tag.bull { background: var(--bull-bg); color: var(--bull); }
        .bias-tag.bear { background: var(--bear-bg); color: var(--bear); }
        .bias-tag.flat { background: #f0f0f0; color: var(--neutral); }
        .bias-tag.pending { background: #f5f5f5; color: #bbb; }
        .sort-bar { display: flex; align-items: center; justify-content: space-between;
                    padding: 6px 2px 4px; }
        .sort-count { font-size: 12px; font-weight: 600; color: var(--text); }
        select { border: 1px solid var(--border); background: var(--card);
                 border-radius: 6px; padding: 4px 8px; font-size: 12px; color: var(--text); cursor: pointer; }
        .skel-card { background: var(--card); border-radius: 10px; padding: 18px 14px;
                     margin-bottom: 8px; box-shadow: var(--shadow); }
        .skel-line { background: linear-gradient(90deg,#e8e8e8 25%,#f4f4f4 50%,#e8e8e8 75%);
                     background-size: 200% 100%; animation: shimmer 1.2s infinite;
                     border-radius: 4px; height: 12px; margin-bottom: 8px; }
        .skel-line.w60 { width: 60%; } .skel-line.w35 { width: 35%; }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .notice { background: #fffbea; border: 1px solid #f5d000; border-radius: 10px;
                  padding: 12px 14px; margin: 8px 0; font-size: 13px; line-height: 1.6; }
        .source-tag { font-size: 11px; color: var(--muted); text-align: center;
                      padding: 6px 0 2px; }
    </style>
</head>
<body>
<header>
    <div class="header-row">
        <div>
            <div class="header-title">📊 個股期貨動能排行</div>
            <div class="header-meta" id="update-time">載入中…</div>
        </div>
        <button id="refresh-btn" onclick="loadData()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>重新整理
        </button>
    </div>
</header>

<div class="tabs">
    <div class="tab bull active" onclick="switchTab('bull',this)">🔴 多方前20</div>
    <div class="tab bear"       onclick="switchTab('bear',this)">🟢 空方前20</div>
    <div class="tab vol"        onclick="switchTab('vol',this)">🔵 成交量前20</div>
</div>

<div id="bull-wrap" class="list-wrap active">
    <div class="sort-bar">
        <span class="sort-count" id="bull-count"></span>
        <select id="sort-bull" onchange="renderAll()">
            <option value="oi_desc">按未平倉↓</option>
            <option value="change_desc">按漲幅↓</option>
            <option value="vol_desc">按成交量↓</option>
        </select>
    </div>
    <div id="bull-list"></div>
</div>
<div id="bear-wrap" class="list-wrap">
    <div class="sort-bar">
        <span class="sort-count" id="bear-count"></span>
        <select id="bear-sort" onchange="renderAll()">
            <option value="oi_desc">按未平倉↓</option>
            <option value="change_asc">按跌幅↓</option>
            <option value="vol_desc">按成交量↓</option>
        </select>
    </div>
    <div id="bear-list"></div>
</div>
<div id="vol-wrap" class="list-wrap">
    <div class="sort-bar">
        <span class="sort-count" id="vol-count"></span>
        <select id="vol-sort" onchange="renderAll()">
            <option value="vol_desc">按成交量↓</option>
            <option value="change_desc">按漲幅↓</option>
            <option value="oi_desc">按未平倉↓</option>
        </select>
    </div>
    <div id="vol-list"></div>
</div>

<div class="source-tag">資料來源：臺灣期貨交易所 OpenAPI｜每日 15:30 自動更新</div>

<script>
let allData = [];

function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.list-wrap').forEach(w => w.classList.remove('active'));
    document.getElementById(tab + '-wrap').classList.add('active');
}

function showSkeletons(id, n=8) {
    document.getElementById(id).innerHTML = Array.from({length:n}, ()=>
        `<div class="skel-card"><div class="skel-line w60"></div><div class="skel-line w35"></div></div>`
    ).join('');
}

async function loadData() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    document.getElementById('update-time').textContent = '載入中…';
    ['bull-list','bear-list','vol-list'].forEach(id => showSkeletons(id));

    try {
        // 加上時間戳避免快取
        const r = await fetch(`data.json?t=${Date.now()}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const json = await r.json();

        allData = json.data || [];
        document.getElementById('update-time').textContent = `資料日期：${json.date || json.updateTime}`;
        renderAll();
    } catch(e) {
        document.getElementById('update-time').textContent = '載入失敗';
        ['bull-list','bear-list','vol-list'].forEach(id => {
            document.getElementById(id).innerHTML =
                `<div class="notice">⚠️ 無法載入資料<br>${e.message}<br><br>
                可能原因：非交易日、或 data.json 尚未更新</div>`;
        });
    } finally {
        btn.classList.remove('spinning');
    }
}

function sortRows(rows, key) {
    const r = [...rows];
    if (key === 'oi_desc')     return r.sort((a,b) => b.openInterest - a.openInterest);
    if (key === 'change_desc') return r.sort((a,b) => b.changeRate - a.changeRate);
    if (key === 'change_asc')  return r.sort((a,b) => a.changeRate - b.changeRate);
    if (key === 'vol_desc')    return r.sort((a,b) => b.volume - a.volume);
    return r;
}

function renderAll() {
    if (!allData.length) return;
    const bulls = allData.filter(d => d.changeRate > 0);
    const bears = allData.filter(d => d.changeRate < 0);

    document.getElementById('bull-count').textContent = `共 ${bulls.length} 檔上漲`;
    document.getElementById('bear-count').textContent = `共 ${bears.length} 檔下跌`;
    document.getElementById('vol-count').textContent  = `共 ${allData.length} 檔`;

    renderList('bull-list', sortRows(bulls, document.getElementById('sort-bull').value).slice(0,20), 'bull');
    renderList('bear-list', sortRows(bears, document.getElementById('bear-sort').value).slice(0,20), 'bear');
    renderList('vol-list',  sortRows(allData, document.getElementById('vol-sort').value).slice(0,20),  'vol');
}

function renderList(id, rows, type) {
    const el = document.getElementById(id);
    if (!rows.length) { el.innerHTML = '<div class="notice">暫無資料</div>'; return; }
    el.innerHTML = rows.map((d, i) => {
        const rate    = d.changeRate ?? 0;
        const rateStr = rate > 0 ? `▲ ${rate.toFixed(2)}%` : rate < 0 ? `▼ ${Math.abs(rate).toFixed(2)}%` : '–';
        const rateClass = rate > 0 ? 'bull' : rate < 0 ? 'bear' : 'flat';

        // 第一行 meta：未平倉/成交量 + 振幅
        const ampStr = (d.amplitude !== null && d.amplitude !== undefined)
            ? `　振幅：${d.amplitude.toFixed(2)}%` : '';
        const meta = type === 'vol'
            ? `成交量：${d.volume.toLocaleString()} 口${ampStr}`
            : `未平倉：${d.openInterest.toLocaleString()} 口　成交量：${d.volume.toLocaleString()} 口${ampStr}`;

        // 第二行 meta：開高低 + 月均量
        const ohlStr = (d.open && d.high && d.low)
            ? `開${d.open}　高${d.high}　低${d.low}` : '';
        const mavStr = (d.monthlyAvgVolume !== null && d.monthlyAvgVolume !== undefined)
            ? `　月均量：${d.monthlyAvgVolume.toLocaleString()} 口` : '';
        const meta2 = (ohlStr || mavStr) ? `${ohlStr}${mavStr}` : '';

        // OI增減標籤
        let oiHtml;
        if (d.oiChange === null || d.oiChange === undefined) {
            oiHtml = `<span class="bias-tag pending">OI增減：累積中</span>`;
        } else {
            const oc = d.oiChange;
            const ocClass = oc > 0 ? 'bull' : oc < 0 ? 'bear' : 'flat';
            const ocStr = oc > 0 ? `+${oc.toLocaleString()}` : oc.toLocaleString();
            oiHtml = `<span class="bias-tag ${ocClass}">OI增減 ${ocStr}</span>`;
        }

        return `<div class="card">
            <div class="rank ${type}">${i+1}</div>
            <div class="card-body">
                <div class="stock-name">${d.name}${d.stockId ? `<span class="sid-tag">${d.stockId}</span>` : ''}</div>
                <div class="stock-meta">${meta}</div>
                ${meta2 ? `<div class="stock-meta">${meta2}</div>` : ''}
            </div>
            <div class="card-right">
                <div class="stock-price">${d.close.toLocaleString()}</div>
                <div class="stock-change ${rateClass}">${rateStr}</div>
                ${oiHtml}
            </div>
        </div>`;
    }).join('');
}

loadData();
</script>
</body>
</html>
